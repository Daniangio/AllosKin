services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${PHASE_UID:-1000}:${PHASE_GID:-1000}"
    ports:
      - "8000:8000"
    volumes:
      # Persist application data only
      - ${PHASE_DATA_ROOT:-./data}:/data/phase
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
      - PHASE_DATA_ROOT=/data/phase
      - TMPDIR=/data/phase/tmp
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${PHASE_UID:-1000}:${PHASE_GID:-1000}"
    command: rq worker phase-jobs --url redis://redis:6379/0
    volumes:
      # Persist application data only
      - ${PHASE_DATA_ROOT:-./data}:/data/phase
    environment:
      - PYTHONUNBUFFERED=1
      - PHASE_DATA_ROOT=/data/phase
      - TMPDIR=/data/phase/tmp
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"