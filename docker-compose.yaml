services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${PHASE_UID:-1000}:${PHASE_GID:-1000}"
    ports:
      - "8000:8000"
    volumes:
      # Mount code for live-reload during development
      - ./phase:/app/phase
      - ./backend:/app/backend
      # Persist application data (projects, trajectories, descriptors) on /scratch
      - ${PHASE_DATA_ROOT:-./data}:/data/phase
    environment:
      - PYTHONUNBUFFERED=1
      # Note: We use the internal service name 'redis' and its default internal port '6379'
      - REDIS_URL=redis://redis:6379/0
      - PHASE_DATA_ROOT=/data/phase
      - TMPDIR=/data/phase/tmp
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

  worker:
    build:
      context: .
      dockerfile: Dockerfile # Uses the same Python environment
    user: "${PHASE_UID:-1000}:${PHASE_GID:-1000}"
    # This is the PRODUCTION command
    command: rq worker phase-jobs --url redis://redis:6379/0
    volumes:
      # The worker needs the exact same volumes as the backend
      - ./phase:/app/phase
      - ./backend:/app/backend
      - ${PHASE_DATA_ROOT:-./data}:/data/phase
    environment:
      - PYTHONUNBUFFERED=1
      - PHASE_DATA_ROOT=/data/phase
      - TMPDIR=/data/phase/tmp
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      # Changing host port to 6380 to avoid conflicts with 6379
      # The container port remains the standard Redis port 6379
      - "6380:6379"
