services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${PHASE_UID:-1000}:${PHASE_GID:-1000}"
    ports:
      - "${PHASE_BACKEND_PORT:-18000}:8000"
    volumes:
      # Persist application data only
      - ${PHASE_DATA_ROOT:-./data}:/data/phase
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
      - PHASE_DATA_ROOT=/data/phase
      - TMPDIR=/data/phase/tmp
      - MPLCONFIGDIR=/tmp/matplotlib
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/projects', timeout=5)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    depends_on:
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${PHASE_FRONTEND_PORT:-18080}:3000"
    depends_on:
      backend:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${PHASE_UID:-1000}:${PHASE_GID:-1000}"
    command: rq worker phase-jobs --url redis://redis:6379/0
    volumes:
      # Persist application data only
      - ${PHASE_DATA_ROOT:-./data}:/data/phase
    environment:
      - PYTHONUNBUFFERED=1
      - PHASE_DATA_ROOT=/data/phase
      - TMPDIR=/data/phase/tmp
      - MPLCONFIGDIR=/tmp/matplotlib
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "${PHASE_REDIS_PORT:-16380}:6379"
